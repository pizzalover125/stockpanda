<!doctype html>
<html>
  <head>
    <title>stockpanda</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .highlight {
        background: radial-gradient(
            circle,
            rgba(0, 0, 0, 0.25) 30%,
            transparent 30%
          )
          center/60% no-repeat;
      }

      .selected {
        background: rgba(255, 215, 0, 0.5) !important;
      }

      #promo-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        border: 1px solid #999;
        padding: 12px;
        z-index: 999;
      }

      #promo-modal img {
        width: 60px;
        height: 60px;
        cursor: pointer;
        margin: 4px;
      }

      #board {
        width: 40vw;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center">
      <div id="board"></div>
      <p id="status"></p>
    </div>

    <div id="promo-modal"></div>

    <script>
      const PIECE_URL =
        "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png";
      let cboard,
        selected = null,
        pendingPromo = null,
        legalCache = {},
        thinking = false;

      function clearHighlights() {
        $("#board .square-55d63").removeClass("highlight selected");
      }

      // apply move to backend; render player move immediately, then trigger engine
      async function applyMove(uci, promotion = "q") {
        if (thinking) return;

        const res = await fetch("/move", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ move: uci, promotion }),
        });
        const d = await res.json();
        if (d.error) return;

        // render the player's move right away
        cboard.position(d.fen.split(" ")[0], false);
        legalCache = {};

        if (d.over) {
          $("#status").text("Game over!");
          return;
        }

        // now ask the engine for its reply
        thinking = true;
        const res2 = await fetch("/engine_move", { method: "POST" });
        const d2 = await res2.json();
        thinking = false;

        cboard.position(d2.fen.split(" ")[0], false);
        $("#status").text(d2.over ? "Game over!" : "");
        legalCache = {};
      }

      // see if move if legal
      async function getLegal(square) {
        if (legalCache[square]) return legalCache[square];
        const res = await fetch("/legal?square=" + square);
        const { moves } = await res.json();
        legalCache[square] = moves;
        return moves;
      }

      // is this promotion?
      function isPromoMove(from, to) {
        const piece = cboard.position()[from];
        return (
          (piece === "wP" && to[1] === "8") || (piece === "bP" && to[1] === "1")
        );
      }

      // show promotion choice modal
      function showPromoModal(uci, color) {
        pendingPromo = uci;
        const modal = $("#promo-modal").find("img").remove().end();
        for (const p of ["Q", "R", "B", "N"])
          $("<img>")
            .attr("src", PIECE_URL.replace("{piece}", color + p))
            .on("click", async () => {
              $("#promo-modal").hide();
              await applyMove(pendingPromo, p.toLowerCase());
              pendingPromo = null;
            })
            .appendTo(modal);
        modal.show();
      }

      // handle a move: if promotion, show modal; else just apply
      async function handleMove(from, to) {
        clearHighlights();
        selected = null;
        if (isPromoMove(from, to)) {
          showPromoModal(from + to, cboard.position()[from][0]);
        } else {
          await applyMove(from + to);
        }
      }

      // handle click on a square
      async function squareClick(square) {
        if (thinking) return;
        if (selected === square) {
          clearHighlights();
          selected = null;
          return;
        }

        if (selected) {
          const moves = await getLegal(selected);
          const from = selected;
          clearHighlights();
          selected = null;
          if (moves.includes(square)) await handleMove(from, square);
          return;
        }

        const moves = await getLegal(square);
        if (!moves.length) return;
        selected = square;
        $(`#board .square-${square}`).addClass("selected");
        moves.forEach((sq) => $(`#board .square-${sq}`).addClass("highlight"));
      }

      // delegate click handler to board container
      $(document).on(
        "click",
        "#board .square-55d63, #board .square-55d63 img",
        function (e) {
          e.stopPropagation();
          const sq = $(this).closest(".square-55d63").attr("data-square");
          if (sq) squareClick(sq);
        },
      );

      // initialize chessboard with drag-and-drop handlers
      cboard = Chessboard("board", {
        draggable: true,
        position: "start",
        pieceTheme: PIECE_URL,
        onDragStart: async (source, piece) => {
          if (piece[0] !== "w" || thinking) return false;
          clearHighlights();
          selected = null;
          const moves = await getLegal(source);
          $(`#board .square-${source}`).addClass("selected");
          moves.forEach((sq) =>
            $(`#board .square-${sq}`).addClass("highlight"),
          );
          return true;
        },
        onDrop: (source, target) => {
          clearHighlights();
          if (target === "offboard" || source === target) return "snapback";
          getLegal(source).then((moves) => {
            if (!moves.includes(target)) return;
            handleMove(source, target);
          });
          return "snapback";
        },
      });

      // reset game
      async function doReset() {
        await fetch("/reset", { method: "POST" });
        cboard.position("start", false);
        clearHighlights();
        selected = null;
        pendingPromo = null;
        legalCache = {};
        thinking = false;
        $("#status").text("");
      }

      // reset on load
      doReset();
    </script>
  </body>
</html>
